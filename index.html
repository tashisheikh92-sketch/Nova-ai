<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#7c6dfa"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Nova AI"/>
<meta name="description" content="Your personal AI chat assistant powered by Claude"/>
<link rel="manifest" href="manifest.json"/>
<title>Nova AI – Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: rgba(255,255,255,0.07);
    --accent: #7c6dfa;
    --accent2: #fa6d9f;
    --text: #f0eeff;
    --muted: #7a7a99;
    --user-bubble: #1e1a3a;
    --ai-bubble: #141420;
    --glow: rgba(124,109,250,0.15);
  }

  html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif; overflow: hidden;
    /* Safe area for notch phones */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(124,109,250,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 80% 80%, rgba(250,109,159,0.08) 0%, transparent 60%),
      var(--bg);
    pointer-events: none;
  }

  .app { display: flex; flex-direction: column; height: 100vh; position: relative; z-index: 1; max-width: 860px; margin: 0 auto; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(20px);
    flex-shrink: 0;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 34px; height: 34px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; box-shadow: 0 0 20px var(--glow);
  }
  .logo-name { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 19px; letter-spacing: -0.5px; }
  .logo-name span { background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header-tag { font-size: 10px; color: var(--muted); background: var(--surface2); border: 1px solid var(--border); padding: 4px 10px; border-radius: 20px; letter-spacing: 0.5px; text-transform: uppercase; }

  .chat-area { flex: 1; overflow-y: auto; padding: 24px 16px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
  .chat-area::-webkit-scrollbar { width: 3px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; text-align: center; padding: 32px 16px; animation: fadeUp 0.6s ease; }
  .empty-icon { font-size: 48px; filter: drop-shadow(0 0 20px rgba(124,109,250,0.4)); }
  .empty-state h2 { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
  .empty-state p { color: var(--muted); font-size: 14px; max-width: 300px; line-height: 1.6; }
  .suggestions { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 400px; }
  .suggestion-btn {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 16px; color: var(--text); font-size: 13px; cursor: pointer;
    transition: all 0.2s; font-family: 'DM Sans', sans-serif; text-align: left; line-height: 1.4;
  }
  .suggestion-btn:active { border-color: var(--accent); background: rgba(124,109,250,0.1); transform: scale(0.98); }

  .message { display: flex; gap: 10px; animation: fadeUp 0.3s ease; }
  .message.user { flex-direction: row-reverse; }

  .avatar {
    width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 14px;
  }
  .avatar.ai { background: linear-gradient(135deg, var(--accent), var(--accent2)); box-shadow: 0 0 12px var(--glow); }
  .avatar.user { background: var(--surface2); border: 1px solid var(--border); }

  .bubble {
    padding: 12px 16px; border-radius: 16px; max-width: calc(100% - 52px);
    font-size: 14px; line-height: 1.7; word-break: break-word;
  }
  .message.ai .bubble { background: var(--ai-bubble); border: 1px solid var(--border); border-top-left-radius: 4px; }
  .message.user .bubble { background: var(--user-bubble); border: 1px solid rgba(124,109,250,0.2); border-top-right-radius: 4px; }

  .typing-indicator { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
  .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: bounce 1.2s infinite; opacity: 0.7; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  .input-area {
    padding: 12px 16px 16px;
    border-top: 1px solid var(--border);
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(20px);
    flex-shrink: 0;
  }
  .input-wrapper {
    display: flex; align-items: flex-end; gap: 10px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 16px; padding: 10px 12px;
    transition: border-color 0.2s;
  }
  .input-wrapper:focus-within { border-color: rgba(124,109,250,0.4); }

  textarea {
    flex: 1; background: none; border: none; outline: none; resize: none;
    font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--text);
    line-height: 1.5; max-height: 120px; min-height: 24px;
    scrollbar-width: none;
  }
  textarea::placeholder { color: var(--muted); }
  textarea::-webkit-scrollbar { display: none; }

  .send-btn {
    width: 36px; height: 36px; border-radius: 10px; border: none; cursor: pointer;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s; box-shadow: 0 0 14px var(--glow);
  }
  .send-btn:active { transform: scale(0.93); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .send-btn svg { width: 17px; height: 17px; fill: white; }

  .input-hint { text-align: center; font-size: 10px; color: var(--muted); margin-top: 10px; }

  /* Install banner */
  #installBanner {
    display: none; align-items: center; justify-content: space-between;
    background: linear-gradient(135deg, rgba(124,109,250,0.15), rgba(250,109,159,0.1));
    border-bottom: 1px solid rgba(124,109,250,0.2);
    padding: 10px 16px; gap: 12px; flex-shrink: 0;
  }
  #installBanner p { font-size: 13px; color: var(--text); flex: 1; }
  #installBanner p span { color: var(--accent); font-weight: 600; }
  .install-btn { background: var(--accent); color: white; border: none; border-radius: 8px; padding: 7px 14px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; font-family: 'DM Sans', sans-serif; }
  .dismiss-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 0 4px; }

  .error-msg { color: #ff6b6b; font-size: 13px; background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.2); border-radius: 10px; padding: 10px 14px; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-5px); } }
</style>
</head>
<body>
<div class="app">

  <!-- Install to home screen banner -->
  <div id="installBanner">
    <p>📲 <span>Install Nova AI</span> on your home screen!</p>
    <button class="install-btn" id="installBtn">Install</button>
    <button class="dismiss-btn" onclick="dismissBanner()">✕</button>
  </div>

  <header>
    <div class="logo">
      <div class="logo-icon">✦</div>
      <div class="logo-name"><span>Nova</span> AI</div>
    </div>
    <div class="header-tag">Powered by Claude</div>
  </header>

  <div class="chat-area" id="chatArea">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">✦</div>
      <h2>What can I help you with?</h2>
      <p>Ask me anything — I'm powered by Claude, one of the world's most capable AI assistants.</p>
      <div class="suggestions">
        <button class="suggestion-btn" onclick="sendSuggestion('Explain how the internet works in simple terms')">🌐 Explain how the internet works simply</button>
        <button class="suggestion-btn" onclick="sendSuggestion('Write a short poem about the night sky')">🌙 Write a poem about the night sky</button>
        <button class="suggestion-btn" onclick="sendSuggestion('What are 5 tips to be more productive?')">⚡ 5 tips to be more productive</button>
        <button class="suggestion-btn" onclick="sendSuggestion('Write a Python function to reverse a string')">💻 Python function to reverse a string</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="msgInput" placeholder="Message Nova AI…" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="input-hint">Nova AI can make mistakes. Verify important info.</div>
  </div>
</div>

<script>
  // Register Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js')
      .then(() => console.log('✅ Service Worker registered'))
      .catch(e => console.log('SW error:', e));
  }

  // PWA Install prompt
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBanner').style.display = 'flex';
  });

  document.getElementById('installBtn').addEventListener('click', async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      dismissBanner();
    }
  });

  function dismissBanner() {
    document.getElementById('installBanner').style.display = 'none';
  }

  // Chat logic
  const chatArea = document.getElementById('chatArea');
  const emptyState = document.getElementById('emptyState');
  const msgInput = document.getElementById('msgInput');
  const sendBtn = document.getElementById('sendBtn');
  let messages = [];
  let isLoading = false;

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function sendSuggestion(text) { msgInput.value = text; sendMessage(); }

  function appendMessage(role, content) {
    if (emptyState.parentNode) emptyState.remove();
    const msg = document.createElement('div');
    msg.className = `message ${role}`;
    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === 'ai' ? '✦' : '👤';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = formatText(content);
    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatArea.appendChild(msg);
    scrollDown();
    return bubble;
  }

  function showTyping() {
    if (emptyState.parentNode) emptyState.remove();
    const msg = document.createElement('div');
    msg.className = 'message ai'; msg.id = 'typingMsg';
    const avatar = document.createElement('div');
    avatar.className = 'avatar ai'; avatar.textContent = '✦';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
    msg.appendChild(avatar); msg.appendChild(bubble);
    chatArea.appendChild(msg); scrollDown();
  }

  function removeTyping() { const t = document.getElementById('typingMsg'); if (t) t.remove(); }

  function formatText(text) {
    return text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/```([\s\S]*?)```/g,'<pre style="background:#0d0d18;border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:12px;overflow-x:auto;margin:8px 0;font-size:12px;font-family:monospace;line-height:1.5">$1</pre>')
      .replace(/`([^`]+)`/g,'<code style="background:#1a1a2e;padding:2px 6px;border-radius:5px;font-size:12px;font-family:monospace">$1</code>')
      .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.*?)\*/g,'<em>$1</em>')
      .replace(/\n/g,'<br>');
  }

  function scrollDown() { setTimeout(() => chatArea.scrollTop = chatArea.scrollHeight, 50); }

  async function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || isLoading) return;
    isLoading = true; sendBtn.disabled = true;
    msgInput.value = ''; msgInput.style.height = 'auto';
    messages.push({ role: 'user', content: text });
    appendMessage('user', text); showTyping();
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: 'You are Nova, a helpful, friendly, and knowledgeable AI assistant. Be concise but thorough. Use markdown formatting when helpful.',
          messages
        })
      });
      const data = await res.json();
      removeTyping();
      if (data.error) throw new Error(data.error.message);
      const reply = data.content.map(b => b.text || '').join('');
      messages.push({ role: 'assistant', content: reply });
      appendMessage('ai', reply);
    } catch (err) {
      removeTyping();
      const errDiv = document.createElement('div');
      errDiv.className = 'error-msg';
      errDiv.textContent = '⚠️ ' + (err.message || 'Something went wrong. Please try again.');
      chatArea.appendChild(errDiv); scrollDown();
      messages.pop();
    }
    isLoading = false; sendBtn.disabled = false; msgInput.focus();
  }

  msgInput.focus();
</script>
</body>
</html>
